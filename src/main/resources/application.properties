spring.application.name=student-achievement-platform-backend
server.port=8080

spring.datasource.url=jdbc:mysql://localhost:3306/extracurricular_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Kolkata
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.sql.init.mode=never
spring.jpa.open-in-view=false

spring.mail.host=${MAIL_HOST:smtp.office365.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:2400030764@kluniversity.in}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.transport.protocol=smtp
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000

mail.enabled=${MAIL_ENABLED:true}
mail.from=${MAIL_FROM:${MAIL_USERNAME:2400030764@kluniversity.in}}

default.admin.password=${DEFAULT_ADMIN_PASSWORD:}
default.student.password=${DEFAULT_STUDENT_PASSWORD:}
